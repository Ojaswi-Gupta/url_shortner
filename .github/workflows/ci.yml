name: CI Pipeline

on:
  push:

env:
  IMAGE_NAME: url-shortener

jobs:
  test:
    name: Run Application Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "BUILD_TAG=build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SHA_TAG=sha-${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${BUILD_TAG}" \
            -t "${IMAGE_NAME}:${SHA_TAG}" \
            .

      - name: Verify Docker image tags
        run: |
          docker image inspect "${IMAGE_NAME}:${BUILD_TAG}"
          docker image inspect "${IMAGE_NAME}:${SHA_TAG}"
      
      - name: Run Docker container
        run: |
          docker run -d \
            --name url-shortener-health-test \
            -p 8000:8000 \
            "${IMAGE_NAME}:${BUILD_TAG}"

      - name: Wait for application to become healthy
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent http://localhost:8000/health; then
              echo
              echo "Health check passed"
              exit 0
            fi

            echo "Waiting for application... attempt ${attempt}/10"
            sleep 2
          done

          echo "Health check failed"
          docker logs url-shortener-health-test
          exit 1

      - name: Stop test container
        if: always()
        run: |
          docker rm -f url-shortener-health-test || true